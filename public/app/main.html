<!DOCTYPE html>
<html lang="hu">
    <title>PraiseProjector</title>
<head>
    <meta charset="utf-8" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="initial-scale=1.0,width=device-width" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="HandheldFriendly" content="True" />
  
    <!-- Open Graph meta tags -->

    <link rel="stylesheet" href="praiseprojector.css">    
    <link rel="stylesheet" href="chordselector.css">    
    <link rel="stylesheet" href="chordpro.css">    
    <script src="pp-api.js"></script>
    <link rel="icon" href="images/pp.svg" type="image/svg+xml">
    <link rel="manifest" href="/app/manifest.json" />
    <!-- ios support -->
    <link rel="apple-touch-icon" href="images/pp.svg" />
    <meta name="apple-mobile-web-app-status-bar" content="#000000" />
    <script>
        P.initServiceWorker();
        function onLoad() {            
            var query_params = {};
            if (query_params.g) document.getElementById("pp-group-id").innerText = query_params.g;
            if (query_params.s) document.getElementById("pp-initial-song").innerText = query_params.s;
            if (query_params.l) document.getElementById("pp-initial-list").innerText = query_params.l;
            var groupname = query_params.n || "PraiseProjector";
            var startLetter = groupname.toLowerCase()[0];
            groupname = ("aáeéiíoóöőuúüű".indexOf(startLetter) >= 0 ? "az " : "a ") + groupname;
            if(groupname.length < 20) {
                var lpad = 20 - groupname.length;
                while(lpad-- > 0) groupname = " " + groupname;
            }
            P.initApp("/praiseprojector/", null, "{title:Isten hozott}\n{soc}\n" + groupname + "\n{eoc}\n{sob}\n dicséret gyüjteményében!\n{eob}");
        }
        function handleDeviceMessage(message) { P.handleDeviceMessage(message); }
    </script>
</head>

<body onload="onLoad()">
    <div id="pp-group-id" class="hidden"></div>
    <div id="pp-initial-song" class="hidden"></div>
    <div id="pp-initial-list" class="hidden"></div>
    <div id="mainView" class="split">
        <div id="options" class="overlay">
            <div class="overlay-content">
                <div class="options">
                    <div>
                        <div class="widthProtect">
                            <div id="chordBoxSelector">
                                <img class="btnImg inverted" alt="Minor" id="imgNoChordBox" src="images/am.svg" />
                                <img class="btnImg hidden" alt="NoChord" id="imgNoChordMode" src="images/nochordbox.svg" />
                                <img class="btnImg hidden" alt="Guitar" id="imgGuitarBox" src="images/guitarchord.svg" />
                                <img class="btnImg hidden" alt="Piano" id="imgPianoBox" src="images/pianochord.svg" />
                            </div>
                            <div>
                                <select id="selChordMode" title="selChordMode">
                                    <option value="0">Am</option>
                                    <option value="1">am</option>
                                    <option value="3">a</option>
                                </select>
                            </div>
                            <div id="chkNoSecChordDupHolder">
                                <input type="checkbox" id="chkNoSecChordDup" checked="checked" />
                                <label for="chkNoSecChordDup" id="chkNoSecChordDupLabel">
                                    <div>
                                        <div>V1&nbsp;Am</div>
                                        <div>V2&nbsp;<s>Am</s></div>
                                    </div>
                                </label>
                            </div>
                            <div>
                                <input type="checkbox" id="chkSubscript" checked="checked" />
                                <label for="chkSubscript">A<sup>m7</sup></label>
                            </div>
                            <div>
                                <input type="checkbox" id="chkAutoTone"/>
                                <label for="chkAutoTone">Ab</label>
                            </div>
                            <div id="closeOptions" class="btnImg">
                                <img class="btnImg" alt="Close" src="images/close-up.svg" />
                            </div>
                        </div>
                        <div class="widthProtect">
                            <div>
                                <input type="checkbox" id="chkUseCapo" />
                                <label for="chkUseCapo"><img class="btnImg" alt="Capo" src="images/capo.svg" /></label>                        	
                            </div>
                            <div>
                                <input id="chkBbMode" type="checkbox">
                                <label for="chkBbMode">Bb</label>
                            </div>
                            <div>
                                <input type="checkbox" id="chkSimplified" />
                                <label for="chkSimplified">A<sup>m<s>7#5</s></sup></label>
                            </div>
                            <div>
                                <input type="checkbox" id="chkMaxText"/>
                                <label for="chkMaxText"><img class="btnImg" alt="&#x1F50D;" src="images/zoom.svg" /></label>                        	
                            </div>
                            <div id="darkmode">
                                <img class="btnImg" alt="Auto" id="imgAutoLight" src="images/autolight.svg" />
                                <img class="btnImg hidden" alt="Day" id="imgDay" src="images/day.svg" />
                                <img class="btnImg hidden non-inverted" alt="Night" id="imgNight" src="images/night.svg" />
                            </div>
                            <div class="hidden"><input type="checkbox" id="chkAdmin" title="admin"/></div>
                            <div id="btnMore">
                                <img class="btnImg inverted" alt="More" src="images/menu.svg" />
                                <div id="moreNotifCount" class="notif-badge hidden"></div>
                                <div id="btnMore-content" class="hidden">
                                    <div>
                                        <img id="iconStartSession" class="btnImg" alt="Play" src="images/play.svg" />
                                        <img id="iconStartOnlineSession" class="btnImg hidden" alt="Play" src="images/play-online.svg" />
                                        <img id="iconStopSession" class="btnImg hidden" alt="Stop" src="images/stop.svg" />
                                    </div>
                                    <div>
                                        <img id="iconWeb" class="btnImg" alt="WWW" src="images/www.svg" />
                                    </div>
                                    <div>
                                        <img id="iconWiFiOff" class="btnImg" alt="WiFi-Off" src="images/wifi.svg" />
                                        <img id="iconWiFiOn" class="btnImg hidden" alt="WiFi-On" src="images/nearby.svg" />
                                    </div>
                                    <div>
                                        <img id="iconLogin" class="btnImg" alt="Login" src="images/enter.svg" />
                                        <img id="iconLogout" class="btnImg hidden" alt="Logout" src="images/exit.svg" />
                                    </div>
                                    <div id="iconCheck" class="hidden">
                                        <img class="btnImg" alt="Login" src="images/todo.svg" />
                                        <div id="songsToCheckCount" class="notif-badge hidden"></div>
                                    </div>
                                    <div>  
                                        <img id="iconReport" class="btnImg" alt="Report" src="images/report.svg" />
                                    </div>
                                    <div id="power">
                                        <img id="iconPower" class="btnImg" alt="Power" src="images/power.svg" />                                        
                                    </div>
                                    <div id="about">
                                        <img class="btnImg" alt="About" src="images/about.svg" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="filterRow" class="widthProtect">
                            <img id="iconDatabase" class="btnImg inverted" alt="Database" src="images/database.svg" />
                            <img id="iconPlaylist" class="btnImg inverted" alt="Playlist" src="images/playlist.svg" />
                            <input id="filter" type="text" title="filter" />
                            <select id="playlists" title="playlists"></select>
                            <div id="clearSearchText" class="filterButton">&#9447;</div>
                            <img id="apply-filter" class="btnImg" alt="Keres" src="images/magnifier.svg" />
                        </div>
                    </div>
                </div>
                <div id="loading-list" class="loading"></div>
                <table class="flexy" id="list" cellspacing="0" cellpadding="0"></table>
            </div>
        </div>
        <div class="mainTable">
            <div class="widthProtect" id="mainToolbar">
                <div id="btnPrev" class="btnDiv">
                    <img class="btnImg" src="images/left.svg" alt="Prev" />
                </div>
                <div id="btnHome" class="btnDiv hidden">
                    <img class="btnImg" src="images/home.svg" alt="Home" />
                </div>
                <div id="btnOptions" class="btnDiv left-aligned">
                    <img class="btnImg" src="images/options.svg" alt="Options" />
                    <div id="optionsNotifCount" class="notif-badge hidden"></div>
                </div>
                <div id="btnShare" class="btnDiv left-aligned">
                    <img class="btnImg" src="images/share.svg" alt="Share" />
                </div>
                <div id="btnWebSession" class="btnDiv hidden left-aligned">
                    <img class="btnImg" src="images/www.svg" alt="www" />
                </div>
                <div id="btnUdpSession" class="btnDiv hidden left-aligned">
                    <img class="btnImg" src="images/tablet.svg" alt="tablet" />
                </div>
                <div>
                    <label>
                        <img id="editInstructions" class="btnImg hidden" alt="Edit instructions" src="images/edit-instructions.svg" />
                    </label>
                    <input type="checkbox" id="chkInstructions"/>
                    <label for="chkInstructions"><img class="btnImg" alt="instructions" src="images/wand.svg" /></label>
                </div>
                <div id="capo">
                    <span id="capoValue"></span>
                    <img class="btnImg" alt="Capo" src="images/capo.svg" />
                    <select name="capo" id="selCapo" title="capo"></select>
                </div>
                <div id="transpose">
                    <span id="shiftValue"></span>
                    <img id="iconTranspose" class="btnImg" alt="Transpose" src="images/transpose.svg" />
                    <select name="transpose" id="selShift" title="transpose"></select>
                </div>
                <div id="netstatus" class="btnDiv btnImg net-startup hidden"></div>
                <div id="cancelEdit" class="btnDiv hidden">
                    <img class="btnImg" src="images/note-cancel.svg" alt="Cancel mark" />
                </div>
                <div id="startEdit" class="btnDiv hidden">
                    <img class="btnImg" id="note-create" src="images/note-create.svg" alt="Create mark" />
                    <img class="btnImg" id="note-apply" src="images/note-apply.svg" alt="Apply mark" />
                </div>
                <div id="accept" class="hidden">
                    <img class="btnImg" src="images/note-apply.svg" alt="accept" />
                </div>
                <div id="reject" class="hidden">
                    <img class="btnImg" src="images/note-cancel.svg" alt="reject" />
                </div>
                <div id="fsdiv" class="btnDiv">
                    <img class="btnImg" id="fullscreen" src="images/fullscreen.svg" alt="Fullscreen" />
                    <img class="btnImg" id="restore" src="images/restore.svg" alt="Restore" />
                </div>
                <div id="btnNext" class="btnDiv">
                    <img class="btnImg" src="images/right.svg" alt="Next" />
                </div>
            </div>
            <div id="swipe-handler">
                <div class="editorContainer">
                    <div class="editor" id="prev-song" tabindex="-1" contenteditable virtualkeyboardpolicy="auto"></div>
                </div>
                <div class="editorContainer">
                    <div class="editor" id="next-song" tabindex="-1" contenteditable virtualkeyboardpolicy="auto"></div>    
                </div>
                <div class="editorContainer">
                    <div class="editor" id="editor" tabindex="-1" contenteditable virtualkeyboardpolicy="auto"></div>    
                </div>
            </div>
        </div>
    </div>
    <textarea id="raw" class="hidden" cols="80" title="raw"></textarea>
    <div id="chordsel" class="chordSelector hidden">
        <table>
            <tr>
                <td>&#119070</td>
                <td>
                    <select id="baseNoteSel" title="base"></select>
                </td>
                <td>&nbsp;&nbsp;&#119074</td>
                <td>
                    <select id="bassNoteSel" title="bass"></select>
                </td>
            </tr>
            <tr>
                <td>Type</td>
                <td colspan="3">
                    <div>
                        <label id="customSpan" for="modifier"></label>
                        <select id="modifier" title="modifier"></select>
                    </div>
                </td>
            </tr>
            <tr>
                <td>Sym</td>
                <td colspan="3">
                    <input id="subscript" type="text" title="subscript"/>
                </td>
            </tr>
            <tr>
                <td>Steps</td>
                <td colspan="3">
                    <div>
                        <label for="steps">1-</label>
                        <input id="steps" type="text" />
                    </div>
                </td>
            </tr>
            <tr>
                <td>Notes</td>
                <td colspan="3">
                    <div>
                        <label id="baseNoteSpan"></label>
                        <input id="notes" type="text" title="notes" />
                    </div>
                </td>
            </tr>
        </table>
        <table>
            <tr>
                <td class="chordbox-notes">
                    <div id="musicChordBox"></div>
                </td>
                <td class="chordbox-piano">
                    <canvas id="pianoChordBox"></canvas>
                </td>
                <td class="chordbox-guitar">
                    <canvas id="guitarChordBox"></canvas>
                </td>
            </tr>
        </table>
    </div>
    <div id="fontSizeDialog" class="chordSelector hidden">
        <div><div>A</div><div>A</div></div>
        <input type="range" min="12" max="24" class="slider" id="baseFontSizeSlider" title="fontsize" />
    </div>
    <div id="zoomSettingsDialog" class="chordSelector hidden">
        <button type="button" id="zoomSettingsClose" class="zoom-close-btn" title="Close" aria-label="Close">&times;</button>
        <div class="zoom-settings-row">
            <input type="checkbox" id="chkZoomHideTitle"/>
            <label for="chkZoomHideTitle" title="hideTitle">
                <span class="zoom-icon zoom-icon-title">
                    <span class="zoom-icon-sample">Title</span>
                    <span class="zoom-icon-slash"></span>
                </span>
            </label>
        </div>
        <div class="zoom-settings-row">
            <input type="checkbox" id="chkZoomHideMeta"/>
            <label for="chkZoomHideMeta" title="hideMeta">
                <span class="zoom-icon zoom-icon-meta">
                    <span class="zoom-icon-sample">Meta</span>
                    <span class="zoom-icon-slash"></span>
                </span>
            </label>
        </div>
        <div class="zoom-settings-row zoom-tag-row">
            <button type="button" class="zoom-tag-btn" id="btnZoomTagVisible" data-tagmode="VISIBLE" title="tagMode">Verse</button>
            <button type="button" class="zoom-tag-btn" id="btnZoomTagAbbrev" data-tagmode="ABBREV" title="tagMode">V</button>
            <button type="button" class="zoom-tag-btn zoom-tag-btn-empty" id="btnZoomTagHidden" data-tagmode="HIDDEN" title="tagMode" aria-label="No tag"></button>
        </div>
        <!--div class="zoom-settings-row">
            <input type="checkbox" id="chkZoomAutoSplit"/>
            <label for="chkZoomAutoSplit" title="autoSplit">
                <span class="zoom-icon zoom-icon-wrap">&#x21B5;</span>
            </label>
        </div-->
        <div class="zoom-settings-row">
            <input type="checkbox" id="chkZoomScroll"/>
            <label for="chkZoomScroll" title="scroll">
                <img class="btnImg" src="images/longlist.svg" alt="Scroll" />
            </label>
        </div>
        <div class="zoom-settings-actions">
            <button type="button" id="zoomSettingsOk" class="zoom-ok-btn">OK</button>
        </div>
    </div>
    <div id="loginDialog" class="chordSelector hidden">
        <div>
            <label for="login"><img class="btnImg" src="images/user.svg" alt="Login" /></label><input id="login" type="text"></input>            
        </div>
        <div>
            <label for="password"><img class="btnImg" src="images/keys.svg" alt="Password" /></label><input id="password" type="password"></input>
            <label id="storeSessionLabel"><input id="keepLoggedIn" type="checkbox"></input><img class="btnImg" src="images/save.svg" alt="Store" /></label>
        </div>
        <div id="loginDialogButtonRow">
            <div>
                <img id="doLogin" class="btnImg" src="images/ok.svg" alt="OK" />
            </div>
            <div>
                <img id="cancelLogin" class="btnImg" src="images/cancel.svg" alt="Cancel" />
            </div>
        </div>
    </div>
    <ul id="sessionList" class="hidden"></ul>
    <div id="aboutBox" class="aboutBox hidden">
        <div id="aboutBoxContent">
            <div class="aboutClose" onclick="document.getElementById('aboutBox').classList.add('hidden');">
                <strong>&times;</strong>
            </div>
        </div>
    </div>
    <div id="confirm-dialog" class="hidden">
        <button id="confirm-dialog-close">&times;</button>
        <div id="confirm-dialog-content"></div>
        <button id="confirm-dialog-ok">OK</button>
    </div>
    <div id="scan-dialog" class="hidden">
        <object type="image/svg+xml" data="images/scan.svg"></object>
        <div id="scan-dialog-ip" class="hidden"></div>
        <span id="scan-dialog-broadcast"></span>
    </div>
    <div id="loading-circle" class="hidden">
           <svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em">
                <circle cx="0.6em" cy="0.6em" r="0.5em" class="circle"/>
            </svg>
    </div>
    <div id="instructionsDialog" class="hidden">
        <button id="ie-dialog-close" type="button">&times;</button>
        <div id="instructionsEditor" class="instructions-editor-panes">
            <div class="song-editor" id="ies-song"></div>
            <div class="instructions-editor-separator" id="ies-left">&nbsp;</div>
            <div class="instructions-editor" id="ies-list"></div>
            <div class="instructions-editor-separator" id="ies-right">&nbsp;</div>
            <div class="song-editor" id="ies-preview"></div>
        </div>
        <div id="instructionsDialogButtonRow">
            <div id="ie-dialog-reset"><img src="images/reset.svg" class="btnImg" alt="Reset"/></div>
            <div id="ie-dialog-revert"><img src="images/revert.svg" class="btnImg" alt="Revert"/></div>
            <div id="ie-dialog-save"><img src="images/ok.svg" class="btnImg" alt="Save"/></div>
        </div>
    </div>
    <img id="chordpro_svg_holder_image" alt="" />
</body>
</html>
