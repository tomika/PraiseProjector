<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,width=device-width,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PraiseProjector</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1115;
        color: #f1f5f9;
      }

      #pp-shell-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background:
          radial-gradient(circle at top, rgba(102, 126, 234, 0.16), transparent 45%),
          linear-gradient(180deg, #11151d 0%, #0b0f14 100%);
        color: #f1f5f9;
        font: 500 15px/1.4 "Segoe UI", system-ui, -apple-system, sans-serif;
        letter-spacing: 0.02em;
        z-index: 9999;
      }

      .pp-shell-loading-card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }

      .pp-shell-spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-top-color: #7dd3fc;
        animation: pp-spin 0.9s linear infinite;
      }

      .pp-shell-loading-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .pp-shell-loading-title {
        font-size: 15px;
        font-weight: 600;
      }

      .pp-shell-loading-subtitle {
        color: rgba(241, 245, 249, 0.72);
        font-size: 13px;
      }

      @keyframes pp-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      // Single self-contained /webapp artifact. ONE build serves three roles,
      // distinguished by what the HOST injects (Electron/Android inject a
      // small inline script setting __ppApiBase and __ppAccess right after
      // <head>, BEFORE this script):
      //   - Host-served follower (Electron/Android webserver): __ppApiBase is the
      //     host origin ⇒ the data API (/songs, /display_query, …) is that origin,
      //     and the client runs in follower mode (RestCore.computeCapabilities).
      //   - Cloud PWA (public /webapp): no injection ⇒ __ppApiBase stays "" and
      //     config.ts derives the cloud host from window.location.origin.
      // Assets (icons, soundfonts, chordpro CSS) always live under /webapp here.
      (function () {
        // Preserve any host-injected globals; default to the cloud configuration.
        window.__ppApiBase = window.__ppApiBase || "";
        var served = !!window.__ppApiBase;
        var underWebapp = location.pathname.indexOf("/webapp") === 0;
        window.__ppAssetBase =
          window.__ppAssetBase || (location.protocol === "file:" ? "app" : window.electronAPI ? "/app" : "/webapp");
        ["chordpro.css", "chordselector.css"].forEach(function (file) {
          var link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = window.__ppAssetBase + "/" + file;
          document.head.appendChild(link);
        });
        try {
          var systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", systemDark ? "dark" : "light");
        } catch {
          /* fall back to CSS defaults */
        }
        // Only the cloud PWA (public /webapp, NOT host-served) is installable and
        // gets the client manifest + service worker. Host-served followers
        // (Electron/Android native shells) must not register a /webapp SW.
        if (!served && underWebapp) {
          var manifestLink = document.createElement("link");
          manifestLink.rel = "manifest";
          manifestLink.href = "/webapp/manifest-client.json";
          document.head.appendChild(manifestLink);
        }
      })();
    </script>
  </head>
  <body>
    <div id="pp-shell-loading" aria-live="polite" aria-busy="true">
      <div class="pp-shell-loading-card">
        <div class="pp-shell-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById("root");
        var loading = document.getElementById("pp-shell-loading");
        if (!root || !loading || !window.MutationObserver) return;
        var removeLoading = function () {
          if (loading && loading.parentNode) loading.parentNode.removeChild(loading);
        };
        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            removeLoading();
          }
        });
        observer.observe(root, { childList: true });
      })();
    </script>
    <script type="module" src="/src/client-view/boot/client-view.tsx"></script>
    <script>
      // Register the service worker only on the public /webapp deployment (the
      // cloud PWA) so the installed client works offline. Host-served followers
      // (Electron/Android) inject window.__ppApiBase and are native shells, so
      // they skip registration. Mirrors index.html's auto-update flow.
      if ("serviceWorker" in navigator && !window.__ppApiBase && window.location.pathname.startsWith("/webapp")) {
        window.addEventListener("load", () => {
          let hasReloadedForUpdate = false;
          const reloadForUpdate = () => {
            if (hasReloadedForUpdate) return;
            hasReloadedForUpdate = true;
            window.location.reload();
          };

          const setupAutoUpdate = (reg) => {
            if (reg.waiting) {
              reg.waiting.postMessage("skipWaiting");
            }

            reg.addEventListener("updatefound", () => {
              const newWorker = reg.installing;
              if (!newWorker) return;

              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  newWorker.postMessage("skipWaiting");
                }
              });
            });

            setInterval(() => {
              reg.update().catch(() => {});
            }, 60 * 1000);

            document.addEventListener("visibilitychange", () => {
              if (document.visibilityState === "visible") {
                reg.update().catch(() => {});
              }
            });

            window.addEventListener("focus", () => {
              reg.update().catch(() => {});
            });
          };

          navigator.serviceWorker.addEventListener("controllerchange", reloadForUpdate);

          // updateViaCache:'none' makes the browser bypass its HTTP cache when
          // (re)fetching sw.js during update checks, so a new deploy is detected
          // even if sw.js is briefly HTTP-cached. Offline is unaffected: the
          // worker still serves from Cache Storage, independent of HTTP caching.
          navigator.serviceWorker
            .register("/webapp/sw.js", { scope: "/webapp/", updateViaCache: "none" })
            .then((reg) => {
              setupAutoUpdate(reg);
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
